title: isoprocessor2
url: https://isoprocessor2.isoverse.org
template:
  bootstrap: 5
  bootswatch: litera
  bslib:
    base_font: {google: "Inter"}
    heading_font: {google: "Plus Jakarta Sans"}
    code_font: {google: "JetBrains Mono"}

development:
  mode: auto

navbar:
  title: isoprocessor2
  type: default
  left:
  - text: Reference
    href: reference/index.html
  right:
  - icon: fa-github fa-lg
    href: https://github.com/isoverse/isoprocessor2
    aria-label: View on GitHub

reference:
- title: Peak detection
  desc: >
    Define peak detectors (and apply them) to locate peaks in chromatographic traces.
  contents:
  - ip_peak_detector
  - ip_detect_peaks

- title: Background detection
  desc: >
    Define background detectors used (from within peak detection) to subtract the baseline.
  contents:
  - ip_bgrd_detector

- title: Time shift detection
  desc: >
    Define time shift detectors used (from within peak detection) to measure each
    mass's apex offset relative to the detection mass.
  contents:
  - ip_time_shift_detector

- title: Ratios and deltas
  desc: >
    Calculate per-peak isotope ratios and delta values from the detected peaks.
  contents:
  - ip_calculate_deltas_vs_ref_gas

- title: Package options
  desc: >
    These functions are available to simplify or customize the data processing.
  contents:
  - isoprocessor2-package
  - ip_options
  - ip_get_options
  - ip_get_option
